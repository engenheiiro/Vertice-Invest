name: CI

# Gate de qualidade: lint + typecheck + testes (com cobertura) + build em cada PR/push.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint • typecheck • test • build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install (root + client + server)
        run: npm run setup

      # (S12) Auditoria de dependências — informativa (não bloqueia o build;
      # Dependabot abre PRs de correção). Surfaceia vulnerabilidades >= high.
      - name: Security audit (npm)
        continue-on-error: true
        run: |
          echo "::group::root"  && npm audit --audit-level=high; echo "::endgroup::"
          echo "::group::client" && npm audit --audit-level=high --prefix client; echo "::endgroup::"
          echo "::group::server" && npm audit --audit-level=high --prefix server; echo "::endgroup::"

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (client + server)
        run: npm run typecheck

      - name: Test backend (com cobertura)
        run: npm run test:ci --prefix server

      - name: Test frontend
        run: npm run test --prefix client -- run

      - name: Build server (validação de sintaxe)
        run: npm run build:server

      - name: Build client
        run: npm run build:client
