name: CI

# Gate de qualidade: lint + typecheck + testes (com cobertura) + build em cada PR/push.
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint • typecheck • test • build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # (8.9) Cache de node_modules entre execuções — `npm run setup` ainda
      # roda, mas resolve quase tudo do cache local em vez de baixar/instalar.
      - name: Cache node_modules (root, client, server)
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            client/node_modules
            server/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json', 'client/package-lock.json', 'server/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install (root + client + server)
        run: npm run setup

      # (S12) Auditoria de dependências — bloqueia publicação se houver
      # vulnerabilidade >= high em qualquer workspace (root / client / server).
      # Para falsos positivos pontuais, use `npm audit --audit-level=critical`
      # ou adicione uma exceção em .nsprc / overrides no package.json.
      - name: Security audit (npm)
        run: |
          echo "::group::root"  && npm audit --audit-level=high; echo "::endgroup::"
          echo "::group::client" && npm audit --audit-level=high --prefix client; echo "::endgroup::"
          echo "::group::server" && npm audit --audit-level=high --prefix server; echo "::endgroup::"

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (client + server)
        run: npm run typecheck

      - name: Test backend (com cobertura)
        run: npm run test:ci --prefix server

      - name: Upload cobertura backend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-backend
          path: server/coverage/
          retention-days: 14

      - name: Test frontend (com cobertura)
        run: npm run test:coverage --prefix client

      - name: Upload cobertura frontend
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend
          path: client/coverage/
          retention-days: 14

      - name: Build server (validação de sintaxe)
        run: npm run build:server

      - name: Build client
        run: npm run build:client

  e2e:
    name: e2e (Playwright)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache node_modules (root, client, server)
        uses: actions/cache@v6
        with:
          path: |
            node_modules
            client/node_modules
            server/node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('package-lock.json', 'client/package-lock.json', 'server/package-lock.json') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Install (root + client + server)
        run: npm run setup

      # (2.6) Navegador do Playwright + libs do sistema (ubuntu).
      - name: Install Playwright browser (chromium)
        run: npm run test:e2e:install --prefix client

      # O webServer do playwright.config.ts faz `npm run build && npm run preview`
      # e o teste intercepta /api no browser — sem MongoDB/Express envolvidos.
      - name: Run E2E (Playwright)
        run: npm run test:e2e --prefix client

      - name: Upload relatório E2E
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 14
