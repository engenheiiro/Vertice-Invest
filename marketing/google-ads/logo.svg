<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 90" fill="none">

  <!-- Glow filter -->
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Blue rounded square (icon background) -->
  <rect width="90" height="90" rx="16" fill="#2563EB" filter="url(#glow)"/>
  <rect width="90" height="90" rx="16" fill="none" stroke="rgba(37,99,235,0.6)" stroke-width="1"/>

  <!-- Shield icon (scaled from 24x24, centered in 90x90) -->
  <g transform="translate(15, 11) scale(2.5)">
    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"
          fill="rgba(255,255,255,0.12)"
          stroke="white"
          stroke-width="1.6"
          stroke-linecap="round"
          stroke-linejoin="round"/>
    <path d="m9 12 2 2 4-4"
          stroke="white"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- Brand name: VÉRTICE -->
  <text x="108"
        y="52"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="36"
        font-weight="800"
        letter-spacing="-1"
        fill="#F1F5F9">VÉRTICE</text>

  <!-- Brand sub: INVEST -->
  <text x="112"
        y="70"
        font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="13"
        font-weight="600"
        letter-spacing="6"
        fill="#2563EB">INVEST</text>

</svg>
